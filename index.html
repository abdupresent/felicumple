<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños, Amigo!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fef3c7;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #fbbf24;
            padding: 20px;
            color: white;
            font-size: 2em;
        }
        .main-content {
            margin: 20px;
        }
        .gift {
            font-size: 1.5em;
            color: #d97706;
            margin: 20px 0;
        }
        .message {
            background-color: #fde68a;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
        footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <header>
        ¡Feliz Cumpleaños, Amigo!
    </header>
    <div class="main-content">
        <p class="gift">🎉🎁 Este es un regalo especial solo para ti 🎁🎉</p>
        <div class="message">
            <p>¡Hola [Nombre del Amigo]!</p>
            <p>Espero que tengas un día lleno de alegría, risas y momentos inolvidables. 🎂</p>
            <p>Gracias por ser un amigo increíble. ¡Celebremos este día como se debe!</p>
        </div>
    </div>
    <footer>
        Con cariño, tu amigo 😊
    </footer>
</body>
</html>
